<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tapgo App 下載</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="download-panel" aria-labelledby="app-title">
      <div class="brand-mark" aria-hidden="true">T</div>
      <p class="eyebrow">Android 應用程式</p>
      <h1 id="app-title">Tapgo</h1>
      <p class="intro">立即下載最新版 APK，安裝到你的 Android 手機開始使用。</p>

      <a class="download-button" href="app-debug.apk" download>
        <span class="button-icon" aria-hidden="true">↓</span>
        下載 APK
      </a>

      <p class="hint">如果手機詢問是否允許安裝未知來源應用程式，請依照系統提示開啟允許後再安裝。</p>
    </section>
  </main>
